name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # CI has no real credentials or data dirs — tests must not need them
          ANTHROPIC_API_KEY: "sk-test-placeholder"
        run: |
          pytest tests/ -v --tb=short

      - name: Show coverage summary (no threshold — informational only)
        run: |
          pip install pytest-cov --quiet
          pytest tests/ --cov=. --cov-report=term-missing --no-header -q 2>/dev/null || true
