# WhaleWatch_Alpha configuration

data:
  # Training data window — do not use data before this date
  data_start_date: "2025-01-20"
  # OOS / live-only split — data after this date is held out from training
  train_cutoff_date: "2026-02-28"
  # Market data provider: "yfinance" (free) | "polygon" (future)
  market_data_provider: "yfinance"

scanners:
  truth_social:
    username: "realDonaldTrump"
    poll_interval_seconds: 60       # Stay under Cloudflare rate limits
    include_reposts: false
    # Min keyword matches to forward to pipeline (0 = all posts)
    min_keywords: 1

  polymarket:
    poll_interval_seconds: 30
    # Minimum volume spike % above 7-day rolling average to trigger signal
    volume_spike_threshold_pct: 50.0
    # Minimum absolute price delta to trigger signal
    min_price_delta: 0.05
    # Session aggregation
    session_timeout_min: 60        # idle minutes before session closes
    min_events_per_session: 1      # sessions with fewer events are discarded

reasoner:
  layer1:
    # LLM provider: "claude" | "openai"
    provider: "claude"
    model: "claude-sonnet-4-6"
    temperature: 0.0                # Deterministic signal generation

  layer2:
    # Predictor: "xgboost" | "logistic" (logistic = legacy fallback)
    predictor: "xgboost"
    # Min confidence (win rate) to forward to executor
    min_confidence: 0.60
    # Holding period bounds (minutes)
    min_holding_minutes: 1
    max_holding_minutes: 4320       # 3 days
    # VIX threshold for regime routing (Decision #8)
    vix_regime_threshold: 20.0
    # Default model period to use for live inference.
    # Choose based on OOS Brier score printed at the end of each training run
    # (lower is better).  Re-evaluate after every retrain — the best period
    # can shift as new data accumulates.  Common choices:
    #   "30m"  — tightest signal, highest noise; use when VIX is elevated
    #   "1h"   — good balance for intraday sessions (current default)
    #   "2h"   — smoother but slower to exit; better for overnight posts
    default_model_period: "1h"
    # Confidence bonus applied when both Poly and TS signals fire in the same
    # direction (dual_signal=True).  Added directly to the model's raw confidence.
    # Set to 0.0 to disable.  Start conservative; revisit once you have
    # >=50 co-occurring dual-signal events in the OOS window to validate.
    dual_signal_confidence_bonus: 0.04

tickers:
  - "SPY"
  - "QQQ"
  - "VIX"

risk:
  stop_loss_pct: 0.02               # 2% hard stop
  take_profit_pct: 0.04             # 4% take profit (2:1 R/R)
  daily_drawdown_halt_pct: 0.03     # Halt new signals if daily P&L < -3%

executor:
  # "paper"  = local SQLite simulation, no broker required (default)
  # "alpaca" = live trading via Alpaca API (requires ALPACA_API_KEY + ALPACA_SECRET_KEY in .env)
  #            Always run "paper" first to validate strategy before switching to "alpaca".
  provider: "paper"
  paper_db_path: "D:/WhaleWatch_Data/paper_trades.db"

  # Alpaca settings (only used when provider = "alpaca")
  alpaca_db_path: "D:/WhaleWatch_Data/alpaca_trades.db"
  alpaca_notional_per_trade: 1000       # USD notional per signal (fractional shares supported)
  # VIX is not directly tradeable — map to a proxy ETF.
  # BUY VIX  → buy this ticker (vol long)
  # SHORT VIX → short this ticker (requires margin)
  vix_proxy_ticker: "UVXY"

# Fade model parameters (Option B)
fade:
  # Minimum initial 30m move to qualify as a fade candidate
  poly_overshoot_min_pct: 0.30      # 0.30%
  post_overshoot_min_pct: 0.30      # 0.30%
  # Entry lag after directional entry (minutes)
  poly_entry_lag_min: 30
  post_entry_lag_min: 30
